<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salma Ech-Chamrahy — Pflegefachfrau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --c-bg:       #0d0d0d;
  --c-surface:  #161616;
  --c-card:     #1c1c1c;
  --c-border:   #2a2a2a;
  --c-orange:   #e8650a;
  --c-orange2:  #ff8c3a;
  --c-cream:    #f5f0e8;
  --c-white:    #ffffff;
  --c-muted:    #888880;
  --c-subtle:   #444440;
  --f-display:  'Playfair Display', Georgia, serif;
  --f-body:     'Jost', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background-color: var(--c-bg);
  color: var(--c-white);
  font-family: var(--f-body);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   LAYOUT & UTILS
═══════════════════════════════════════════ */
section { padding: 100px 5% 80px; position: relative; }
.reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
.reveal.in { opacity: 1; transform: translateY(0); }

/* ═══════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  align-items: center;
  gap: 40px;
  padding-top: 140px;
}

.hero-left { z-index: 2; }
.hero-eyebrow {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--c-orange);
  margin-bottom: 15px;
  font-weight: 600;
}

.hero-name {
  font-family: var(--f-display);
  font-size: clamp(3.5rem, 8vw, 6.5rem);
  line-height: 0.9;
  font-weight: 700;
  margin-bottom: 25px;
  color: var(--c-cream);
}
.hero-name-italic { font-style: italic; font-weight: 400; color: var(--c-white); opacity: 0.8; }

.hero-role { font-size: 20px; color: var(--c-orange2); font-weight: 500; margin-bottom: 15px; }
.hero-bio { font-size: 18px; color: var(--c-muted); max-width: 500px; margin-bottom: 40px; }

.hero-actions { display: flex; gap: 15px; margin-bottom: 60px; }
.btn {
  padding: 18px 32px;
  border-radius: 4px;
  font-weight: 500;
  text-decoration: none;
  transition: 0.3s;
  font-size: 15px;
}
.btn-fill { background: var(--c-orange); color: white; }
.btn-fill:hover { background: var(--c-orange2); transform: translateY(-3px); }
.btn-ghost { border: 1px solid var(--c-border); color: var(--c-cream); }
.btn-ghost:hover { border-color: var(--c-orange); background: rgba(232, 101, 10, 0.05); }

.hero-stats { display: flex; gap: 40px; border-top: 1px solid var(--c-border); padding-top: 30px; }
.stat-val { font-family: var(--f-display); font-size: 32px; color: var(--c-cream); }
.stat-lbl { font-size: 12px; text-transform: uppercase; color: var(--c-subtle); letter-spacing: 1px; }

.hero-right { position: relative; height: 100%; display: flex; align-items: flex-end; }
.hero-photo {
  width: 100%;
  height: 85vh;
  object-fit: cover;
  filter: grayscale(20%) contrast(110%);
  border-radius: 4px;
}
.hero-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 70%, var(--c-bg));
}

@media (max-width: 992px) {
  .hero { grid-template-columns: 1fr; padding-top: 100px; text-align: center; }
  .hero-name { font-size: 4rem; }
  .hero-bio, .hero-actions, .hero-stats { margin-left: auto; margin-right: auto; justify-content: center; }
  .hero-photo { height: 60vh; margin-top: 40px; }
}
</style>
</head>
<body>

<section class="hero" id="home">
  <div class="hero-left">
    <div class="hero-eyebrow">Pflegefachfrau in Ausbildung</div>
    <h1 class="hero-name">
      Salma<br>
      <span class="hero-name-italic">Ech-Chamrahy</span>
    </h1>
    <p class="hero-role">Pflegeassistentin · Agadir, Marokko</p>
    <p class="hero-bio">
      Engagierte Pflegeassistentin مع خبرة عملية في رعاية المسنين وحاصلة على شهادة 
      <strong>telc B2</strong>، مستعدة للانضمام للفرق الطبية في ألمانيا.
    </p>
    <div class="hero-actions">
      <a href="#contact" class="btn btn-fill">Kontakt aufnehmen</a>
      <a href="#erfahrung" class="btn btn-ghost">Werdegang ansehen</a>
    </div>
    <div class="hero-stats">
      <div>
        <div class="stat-val">2+</div>
        <div class="stat-lbl">Praktika</div>
      </div>
      <div>
        <div class="stat-val">B2</div>
        <div class="stat-lbl">Deutsch</div>
      </div>
      <div>
        <div class="stat-val">4</div>
        <div class="stat-lbl">Sprachen</div>
      </div>
    </div>
  </div>

  <div class="hero-right">
    <img class="hero-photo" src="Picsart_26-03-15_16-29-04-661(1)(1).jpg" alt="Salma Ech-Chamrahy">
    <div class="hero-photo-overlay"></div>
  </div>
</section>

<script>
// Scroll reveal logic
const ro = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      ro.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
</script>

</body>
</html>
